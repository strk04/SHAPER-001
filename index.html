<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SHAPER 001 — Tipografia generativa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Datatype&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-active-section="shaper">
  <a href="#artwork" class="skip-link">Salta a la previsualització</a>

  <nav id="appMenu" class="app-menu" aria-label="Seccions de SHAPER">
    <h1 class="app-title">Q SHAPER 001</h1>
    <section class="app-menu-group" aria-label="Shaper">
      <h2 class="app-menu-title">/shaper</h2>
      <div class="app-menu-list">
        <button class="app-menu-item" type="button" data-panel-target="panel-atom" aria-pressed="true">
          <span class="app-menu-mark" aria-hidden="true">[*]</span>
          <span>Àtom</span>
        </button>
        <button class="app-menu-item" type="button" data-panel-target="panel-2d" aria-pressed="false">
          <span class="app-menu-mark" aria-hidden="true">[ ]</span>
          <span>2D</span>
        </button>
        <button class="app-menu-item" type="button" data-panel-target="panel-3d" aria-pressed="false">
          <span class="app-menu-mark" aria-hidden="true">[ ]</span>
          <span>3D</span>
        </button>
        <button class="app-menu-item" type="button" data-panel-target="panel-format" aria-pressed="false">
          <span class="app-menu-mark" aria-hidden="true">[ ]</span>
          <span>Format</span>
        </button>
        <button class="app-menu-item" type="button" data-panel-target="panel-colors" aria-pressed="false">
          <span class="app-menu-mark" aria-hidden="true">[ ]</span>
          <span>Colors</span>
        </button>
        <button class="app-menu-item" type="button" data-panel-target="panel-presets" aria-pressed="false">
          <span class="app-menu-mark" aria-hidden="true">[ ]</span>
          <span>Presets</span>
        </button>
        <button class="app-menu-item" type="button" data-panel-target="panel-export" aria-pressed="false">
          <span class="app-menu-mark" aria-hidden="true">[ ]</span>
          <span>Export</span>
        </button>
      </div>
    </section>

    <div class="export-footer" role="group" aria-label="Controls de reproducció">
      <div class="preview-control">
        <span id="renderInfo">Canvas 1080 × 1350</span>
        <button type="button" id="playPause" aria-label="Reprodueix l'animació">Reprodueix</button>
      </div>
    </div>
    <p id="srAnnounce" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></p>
  </nav>

  <aside class="section-sidebar" aria-label="Controls de SHAPER">
    <button
      id="navToggle"
      class="nav-toggle"
      type="button"
      aria-expanded="true"
      aria-controls="appMenu"
      aria-label="Amaga la navegació"
    ><span aria-hidden="true">[← nav]</span></button>

    <div class="section-view" data-section="shaper">
      <form id="controls" autocomplete="off">

        <section class="panel is-active" id="panel-atom">
          <h3 class="panel-title">Àtom</h3>

          <label class="control-stack slider" data-key="fontSize" data-min="12" data-max="160" data-step="1"></label>

          <label class="control-row" for="font">
            <span>Tipografia</span>
            <select id="font" name="font">
              <option value="times-regular">Times New Roman Regular</option>
              <option value="times-bold">Times New Roman Bold</option>
              <option value="courier-regular" selected>Courier Regular</option>
              <option value="courier-bold">Courier Bold</option>
              <option value="helvetica-regular">Helvetica Regular</option>
              <option value="helvetica-bold">Helvetica Bold</option>
            </select>
          </label>

          <label class="control-stack" for="text">
            <span>Text</span>
            <textarea id="text" class="gtx-textarea" name="text" rows="5">Ritme compartit. Flux individual.</textarea>
          </label>

          <label class="control-stack slider" data-key="wordsPerRow" data-min="1" data-max="20" data-step="1"></label>

          <label class="control-row" for="hardWrap">
            <span>Tall fix</span>
            <input type="checkbox" id="hardWrap" name="hardWrap">
          </label>

          <h3 class="panel-title">Composició</h3>
          <label class="control-stack slider" data-key="charTrack" data-min="0" data-max="60" data-step="1"></label>
          <label class="control-stack slider" data-key="leading" data-min="20" data-max="200" data-step="1"></label>
          <label class="control-stack slider" data-key="wordTrack" data-min="0" data-max="200" data-step="1"></label>
          <label class="control-stack slider" data-key="wordChaos" data-min="0" data-max="100" data-step="1"></label>
          <label class="control-stack slider" data-key="wordRamp" data-min="0" data-max="1" data-step="0.1"></label>

          <h3 class="panel-title">Distorsió</h3>
          <label class="control-stack slider" data-key="amplitude" data-min="0" data-max="200" data-step="1"></label>
          <label class="control-stack slider" data-key="frequency" data-min="0.001" data-max="0.05" data-step="0.001"></label>
          <label class="control-stack slider" data-key="noiseAmt" data-min="0" data-max="100" data-step="1"></label>
          <label class="control-stack slider" data-key="charChaos" data-min="0" data-max="100" data-step="1"></label>
          <label class="control-stack slider" data-key="yJitter" data-min="0" data-max="60" data-step="1"></label>
          <label class="control-stack slider" data-key="yJitterAffect" data-min="0" data-max="1" data-step="0.1"></label>
          <label class="control-stack slider" data-key="dropProb" data-min="0" data-max="1" data-step="0.01"></label>
        </section>

        <section class="panel" id="panel-2d" hidden>
          <h3 class="panel-title">Forma 2D</h3>
          <label class="control-row" for="shape">
            <span>Forma</span>
            <select id="shape" name="shape">
              <option value="rectangle">Rectangle</option>
              <option value="wave">Ona</option>
              <option value="trapezoid">Trapezi</option>
              <option value="diamond">Diamant</option>
              <option value="custom">Personalitzada</option>
            </select>
          </label>
          <div id="svgUpload2d" class="upload-row" hidden>
            <input class="tone-file-input" type="file" id="svgFile2d" name="svgFile2d" accept=".svg,image/svg+xml" aria-label="Carrega forma SVG">
            <label class="tone-upload-button" for="svgFile2d">Carrega SVG</label>
          </div>

          <h3 class="panel-title">Moviment 2D</h3>
          <label class="control-stack slider" data-key="speed2d" data-min="0" data-max="3" data-step="0.1"></label>
          <label class="control-row" for="motion2d">
            <span>Moviment</span>
            <select id="motion2d" name="motion2d">
              <option value="flow" selected>Flux horitzontal</option>
              <option value="static">Estàtic</option>
              <option value="rain">Pluja</option>
            </select>
          </label>
          <label class="control-stack slider" data-key="rainSpeed2d" data-min="0" data-max="3" data-step="0.1"></label>
        </section>

        <section class="panel" id="panel-3d" hidden>
          <h3 class="panel-title">Estil 3D</h3>
          <label class="control-row" for="guides">
            <span>Guies</span>
            <input type="checkbox" id="guides" name="guides">
          </label>
          <label class="control-row" for="backfaceMirror">
            <span>Mirall posterior</span>
            <input type="checkbox" id="backfaceMirror" name="backfaceMirror">
          </label>
          <label class="control-row" for="surfaceText">
            <span>Glifs sobre superfície</span>
            <input type="checkbox" id="surfaceText" name="surfaceText" checked>
          </label>

          <h3 class="panel-title">Forma 3D</h3>
          <label class="control-row" for="form">
            <span>Forma</span>
            <select id="form" name="form">
              <option value="plane">Pla</option>
              <option value="cylinder">Cilindre</option>
              <option value="helix">Hèlix</option>
              <option value="sphere">Esfera</option>
              <option value="cube">Cub</option>
              <option value="cluster">Conjunt</option>
              <option value="star-prism">Prisma estrella</option>
              <option value="custom-prism">Prisma personalitzat</option>
              <option value="torus">Torus</option>
              <option value="cone">Con</option>
              <option value="disc">Disc</option>
              <option value="wave-plane">Ondulat</option>
              <option value="mobius">Möbius</option>
              <option value="torus-knot">Nus toroïdal</option>
              <option value="box">Caixa</option>
              <option value="saddle">Sella</option>
              <option value="capsule">Càpsula</option>
              <option value="double-helix">Doble hèlix</option>
            </select>
          </label>
          <p id="form3d-status" role="status" class="sr-only"></p>
          <div id="svgUpload3d" class="upload-row" hidden>
            <input class="tone-file-input" type="file" id="svgFile3d" name="svgFile3d" accept=".svg,image/svg+xml" aria-label="Carrega contorn SVG">
            <label class="tone-upload-button" for="svgFile3d">Carrega contorn</label>
          </div>
          <label class="control-stack slider" data-key="formSize" data-min="100" data-max="800" data-step="1"></label>
          <label class="control-stack slider" data-key="aspect" data-min="0.2" data-max="3" data-step="0.1"></label>
          <label class="control-stack slider" data-key="facets" data-min="3" data-max="12" data-step="1"></label>
          <label class="control-stack slider" data-key="turns" data-min="1" data-max="8" data-step="1"></label>
          <label class="control-stack slider" data-key="count" data-min="1" data-max="9" data-step="1"></label>
          <label class="control-stack slider" data-key="scatter" data-min="0" data-max="200" data-step="1"></label>

          <h3 class="panel-title">Càmera</h3>
          <label class="control-row" for="projection">
            <span>Projecció</span>
            <select id="projection" name="projection">
              <option value="isometric">Isomètrica</option>
              <option value="perspective">Perspectiva</option>
            </select>
          </label>
          <label class="control-stack slider" data-key="zoom" data-min="0.3" data-max="3" data-step="0.1"></label>
          <label class="control-stack slider" data-key="fov" data-min="30" data-max="120" data-step="1"></label>
          <label class="control-stack slider" data-key="rotXSpeed" data-min="-2" data-max="2" data-step="0.1"></label>
          <label class="control-stack slider" data-key="rotYSpeed" data-min="-2" data-max="2" data-step="0.1"></label>
          <label class="control-stack slider" data-key="rotZSpeed" data-min="-2" data-max="2" data-step="0.1"></label>
          <label class="control-stack slider" data-key="angleX" data-min="-180" data-max="180" data-step="1"></label>
          <label class="control-stack slider" data-key="angleY" data-min="-180" data-max="180" data-step="1"></label>
          <label class="control-stack slider" data-key="depthFade" data-min="0" data-max="1" data-step="0.05"></label>

          <h3 class="panel-title">Moviment 3D</h3>
          <label class="control-stack slider" data-key="speed3d" data-min="0" data-max="3" data-step="0.1"></label>
          <label class="control-stack slider" data-key="pulse" data-min="0" data-max="1" data-step="0.05"></label>
          <label class="control-stack slider" data-key="pulseSpeed" data-min="0" data-max="2" data-step="0.1"></label>
          <label class="control-stack slider" data-key="rainProb" data-min="0" data-max="1" data-step="0.01"></label>
          <label class="control-stack slider" data-key="rainSpeed" data-min="0" data-max="3" data-step="0.1"></label>
        </section>

        <section class="panel" id="panel-format" hidden>
          <h3 class="panel-title">Format</h3>
          <label class="control-row" for="format-select">
            <span>Preset</span>
            <select id="format-select" name="format-select">
              <option value="1080x1920">9:16 — Stories / Reels</option>
              <option value="1920x1080">16:9 — Pantalla / YouTube</option>
              <option value="1080x1080">1:1 — Post quadrat</option>
              <option value="1080x1350" selected>4:5 — Post vertical</option>
              <option value="1350x1080">5:4 — Post apaïsat</option>
              <option value="1485x2100">A4 vertical</option>
              <option value="2100x1485">A4 apaïsat</option>
              <option value="custom">Personalitzat</option>
            </select>
          </label>

          <div id="custom-size-row" class="custom-size" hidden>
            <label class="control-row" for="custom-unit">
              <span>Unitat</span>
              <select id="custom-unit" name="custom-unit">
                <option value="px">px</option>
                <option value="cm">cm</option>
              </select>
            </label>
            <label id="custom-dpi-row" class="control-row" for="custom-dpi" hidden>
              <span>DPI</span>
              <select id="custom-dpi" name="custom-dpi">
                <option value="72">72 — Web</option>
                <option value="150">150</option>
                <option value="300" selected>300 — Impremta</option>
              </select>
            </label>
            <label class="control-row" for="custom-width">
              <span>Amplada <span class="custom-unit-label">px</span></span>
              <input type="number" id="custom-width" class="num-input" name="custom-width" min="100" step="1" value="1080">
            </label>
            <label class="control-row" for="custom-height">
              <span>Alçada <span class="custom-unit-label">px</span></span>
              <input type="number" id="custom-height" class="num-input" name="custom-height" min="100" step="1" value="1350">
            </label>
            <button type="button" id="apply-custom-size">Aplica format</button>
          </div>
          <p id="formatStatus" class="hint" role="status"></p>
        </section>

        <section class="panel" id="panel-colors" hidden>
          <h3 class="panel-title">Colors</h3>
          <label class="control-row" for="bgColor">
            <span>Color de fons</span>
            <input type="color" id="bgColor" name="bgColor" value="#f4f4f4">
          </label>
          <label class="control-row" for="textColor">
            <span>Color del text</span>
            <input type="color" id="textColor" name="textColor" value="#111111">
          </label>
        </section>

        <section class="panel" id="panel-presets" hidden>
          <h3 class="panel-title">Presets</h3>
          <div class="control-row">
            <label class="sr-only" for="presetName">Nom del preset</label>
            <input type="text" id="presetName" placeholder="Nom del preset" autocomplete="off" style="flex:1;min-width:0">
            <button id="savePreset" type="button">Desa</button>
          </div>
          <ul id="presetList" role="list" aria-label="Presets desats"></ul>
          <div style="display:flex;gap:var(--space-1);margin-top:var(--space-2)">
            <button id="exportPresets" type="button" style="flex:1">Export JSON</button>
            <button id="importPresetsBtn" type="button" style="flex:1" aria-label="Importa presets des de JSON">Import JSON</button>
            <input type="file" id="importPresets" accept=".json" style="display:none">
          </div>
        </section>

        <section class="panel" id="panel-export" hidden>
          <h3 class="panel-title">Export</h3>

          <fieldset class="gtx-fieldset">
            <legend>Vídeo</legend>
            <label class="control-row" for="recordFps">
              <span>FPS</span>
              <select id="recordFps">
                <option value="30" selected>30 fps</option>
                <option value="60">60 fps</option>
              </select>
            </label>
            <label class="control-row" for="recordDuration">
              <span>Durada</span>
              <select id="recordDuration">
                <option value="manual" selected>Manual</option>
                <option value="5">5 s</option>
                <option value="10">10 s</option>
                <option value="15">15 s</option>
                <option value="30">30 s</option>
              </select>
            </label>
            <p id="loopNote" class="hint" hidden>La gravació s'atura automàticament.</p>
            <button id="recordVideo" type="button" aria-pressed="false">Grava MP4</button>
          </fieldset>

          <button id="saveSvg" type="button">Export SVG</button>

          <div role="group" aria-label="Export PNG" style="display:flex;gap:var(--space-1)">
            <button id="savePng72"  type="button" style="flex:1" aria-label="Export PNG 72 dpi">72 dpi</button>
            <button id="savePng150" type="button" style="flex:1" aria-label="Export PNG 150 dpi">150 dpi</button>
            <button id="savePng300" type="button" style="flex:1" aria-label="Export PNG 300 dpi">300 dpi</button>
          </div>

          <p id="exportStatus" role="status" aria-live="polite" aria-atomic="true"></p>
        </section>

      </form>
    </div>
  </aside>

  <main class="stage">
    <div class="canvas-shell">
      <div id="artwork" class="artwork" role="img" aria-label="Previsualització de tipografia generativa" tabindex="-1"></div>
    </div>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
